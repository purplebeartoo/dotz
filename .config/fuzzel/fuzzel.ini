[main]
dpi-aware = no
fields = name,generic,comment,categories,filename,keywords
font = LigaIosevka Nerd Font:weight=bold:size=12
horizontal-pad = 20
icon-theme = Papirus-Dark
layer = overlay
line-height = 22
prompt = "❯  " 
terminal = kitty -e
width = 60

[border]
radius = 10
width = 2

[colors]
background=16161eff
text=c0caf5ff
match=2ac3deff
selection=343a55ff
selection-match=2ac3deff
selection-text=c0caf5ff
border=27a1b9ff

[dmenu]
exit-immediately-if-empty = yes
