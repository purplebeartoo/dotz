[main]
dpi-aware = no
fields = name,generic,comment,categories,filename,keywords
font = Font Awesome:weight=bold:size=11
horizontal-pad = 20
icon-theme = Tela-circle-dracula-dark
layer = overlay
line-height = 23
prompt = "❯  " 
terminal = ghostty -e
width = 60

[border]
radius = 10
width = 2

[colors]
background = 282a36ff
border = 8be9fdff
match = ff5555ff
selection = 44475aff
selection-match = ff5555ff
selection-text = f8f8f2ff
text = f8f8f2ff

[dmenu]
exit-immediately-if-empty = yes
