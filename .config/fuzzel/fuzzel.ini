fields = name,generic,comment,categories,filename,keywords
font = LigaIosevka Nerd Font:weight=bold:size=12
horizontal-pad = 20
icon-theme = Papirus-Dark
layer = overlay
line-height = 22
prompt = "❯  " 
terminal = footclient -e
width = 60

[border]
radius = 10
width = 2

[colors]
background = 1e1e2eff
