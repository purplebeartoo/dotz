[main]
dpi-aware = no
fields = name,generic,comment,categories,filename,keywords
font = LigaIosevka Nerd Font:weight=bold:size=12
horizontal-pad = 20
icon-theme = Tela-circle-dracula-dark
layer = overlay
line-height = 22
prompt = "❯  " 
terminal = kitty -e
width = 60

[border]
radius = 10
width = 2

[colors]
background=282a36ff
text=f8f8f2ff
match=8be9fdff
selection=44475aff
selection-match=8be9fdff
selection-text=f8f8f2ff
