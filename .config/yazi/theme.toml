# : Manager {{{

[manager]
cwd = { fg = "#50fa7b" }

# Hovered
hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#f1fa8c", bold = true, italic = true, underline = true }
find_position = { fg = "#ff79c6", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#50fa7b", bg = "#50fa7b" }
marker_cut      = { fg = "#ff5555", bg = "#ff5555" }
marker_marked   = { fg = "#50fa7b", bg = "#bd93f9" }
marker_selected = { fg = "#f1fa8c", bg = "#f1fa8c" }

# Tab
tab_active   = { reversed = true }
tab_inactive = {}
tab_width    = 1

# Count
count_copied   = { fg = "#282a36", bg = "#50fa7b" }
count_cut      = { fg = "#282a36", bg = "#ff5555" }
count_selected = { fg = "#282a36", bg = "#f1fa8c" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb86c" }

# : }}}


# : Status {{{

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#45475a", bg = "#45475a" }

# Mode
mode_normal = { fg = "#282a36", bg = "#bd93f9", bold = true }
mode_select = { fg = "#282a36", bg = "#50fa7b", bold = true }
mode_unset  = { fg = "#282a36", bg = "#f2cdcd", bold = true }

# Progress
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#bd93f9", bg = "#45475a" }
progress_error  = { fg = "#ff5555", bg = "#45475a" }

# Permissions
permissions_t = { fg = "#bd93f9" }
permissions_r = { fg = "#f1fa8c" }
permissions_w = { fg = "#ff5555" }
permissions_x = { fg = "#50fa7b" }
permissions_s = { fg = "#7f849c" }

# : }}}


# : Select {{{

[select]
border   = { fg = "#bd93f9" }
active   = { fg = "#ff79c6", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#bd93f9" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[completion]
border = { fg = "#bd93f9" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#bd93f9" }
title   = {}
hovered = { fg = "#ff79c6", underline = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#313244" }
cand            = { fg = "#50fa7b" }
rest            = { fg = "#9399b2" }
desc            = { fg = "#ff79c6" }
separator       = "  "
separator_style = { fg = "#585b70" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#50fa7b" }
run     = { fg = "#ff79c6" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#45475a", bg = "#f8f8f2" }

# : }}}


# : Notify {{{

[notify]
title_info  = { fg = "#50fa7b" }
title_warn  = { fg = "#f1fa8c" }
title_error = { fg = "#ff5555" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#50fa7b" },

	# Media
	{ mime = "{audio,video}/*", fg = "#f1fa8c" },

	# Archives
	{ mime = "application/*zip", fg = "#ff79c6" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#ff79c6" },

	# Documents
	{ mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#50fa7b" },

	# Fallback
	{ name = "*", fg = "#f8f8f2" },
	{ name = "*/", fg = "#bd93f9" }
]

# : }}}

