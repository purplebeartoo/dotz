window:
  padding:
    x: 12
    y: 12
  position:
    x: 0
    y: 0
  decorations: none
  startup_mode: Windowed
  dimensions:
    columns: 100
    lines: 30
  opacity: 0.96

cursor:
  style: 
    shape: Block
    blinking: On
    blink_interval: 750

font:
  normal:
    family: FiraCode Nerd Font
    style: Regular
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  bold_italic:
    family: FiraCode Nerd Font
    style: Bold Italic
  size: 11
  offset:
    x: 0
    y: 0

colors:
  primary:
    background: '#0c1118'
    foreground: '#82cde7'
  cursor:
    text:       '#0c1118'
    cursor:     '#82cde7'
  normal:
    black:      '#0c1118'
    red:        '#F15915'
    green:      '#AB3D48'
    yellow:     '#055FA0'
    blue:       '#286BB8'
    magenta:    '#BB5EA3'
    cyan:       '#039BDF'
    white:      '#82cde7'
  bright:
    black:      '#5b8fa1'
    red:        '#F15915'
    green:      '#AB3D48'
    yellow:     '#055FA0'
    blue:       '#286BB8'
    magenta:    '#BB5EA3'
    cyan:       '#039BDF'
    white:      '#82cde7'
# END ACE
